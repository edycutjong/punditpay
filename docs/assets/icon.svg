<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="PunditPay">
  <defs>
    <linearGradient id="p-hex" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="var(--primary, #38BDF8)"/><stop offset="100%" stop-color="#7CD4FF"/></linearGradient>
    <radialGradient id="p-coin" cx="50%" cy="42%" r="60%"><stop offset="0%" stop-color="var(--accent, #26A17B)"/><stop offset="100%" stop-color="#155C43"/></radialGradient>
    <filter id="p-soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="var(--bg, #0B0E11)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="111.5" fill="none" stroke="var(--border-strong, #1c3a4a)" stroke-width="1"/>

  <!-- agent hexagon core -->
  <path d="M256 96 L392 176 V336 L256 416 L120 336 V176 Z" fill="none" stroke="url(#p-hex)" stroke-width="18" stroke-linejoin="round" opacity="0.9"/>
  <!-- money coin -->
  <circle cx="256" cy="256" r="96" fill="url(#p-coin)" filter="url(#p-soft)"/>
  <circle cx="256" cy="256" r="88" fill="url(#p-coin)"/>
  <!-- USD₮ mark -->
  <g stroke="#EAFBF4" stroke-width="18" stroke-linecap="round">
    <line x1="212" y1="222" x2="300" y2="222"/>
    <line x1="256" y1="222" x2="256" y2="300"/>
  </g>
  <!-- reasoning nodes -->
  <g fill="var(--primary, #38BDF8)"><circle cx="256" cy="96" r="15"/><circle cx="392" cy="336" r="12"/><circle cx="120" cy="336" r="12"/></g>
</svg>
