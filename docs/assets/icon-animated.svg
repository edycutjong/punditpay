<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="PunditPay — animated">
  <defs>
    <linearGradient id="pa-hex" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#7CD4FF"/></linearGradient>
    <radialGradient id="pa-coin" cx="50%" cy="42%" r="60%"><stop offset="0%" stop-color="#26A17B"/><stop offset="100%" stop-color="#155C43"/></radialGradient>
    <filter id="pa-soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="10"/></filter>
    <linearGradient id="pa-glint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EAFBFF" stop-opacity="0"/><stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.45"/><stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="pa-tileclip"><rect x="16" y="16" width="480" height="480" rx="112"/></clipPath>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="#0B0E11"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="111.5" fill="none" stroke="#1c3a4a" stroke-width="1"/>

  <!-- rotating agent hexagon -->
  <path d="M256 96 L392 176 V336 L256 416 L120 336 V176 Z" fill="none" stroke="url(#pa-hex)" stroke-width="18" stroke-linejoin="round" opacity="0.85"
        stroke-dasharray="10 20" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="22s" repeatCount="indefinite"/>
  </path>

  <!-- pulsing money coin -->
  <circle cx="256" cy="256" r="96" fill="url(#pa-coin)" filter="url(#pa-soft)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="92;100;92" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="256" r="88" fill="url(#pa-coin)"/>
  <g stroke="#EAFBF4" stroke-width="18" stroke-linecap="round"><line x1="212" y1="222" x2="300" y2="222"/><line x1="256" y1="222" x2="256" y2="300"/></g>

  <!-- 'tip sent' ring -->
  <circle cx="256" cy="256" r="96" fill="none" stroke="#26A17B" stroke-width="4">
    <animate attributeName="r" values="96;150" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- sequenced reasoning nodes on hex vertices -->
  <g fill="#38BDF8">
    <circle cx="256" cy="96" r="15"><animate attributeName="fill-opacity" values="1;0.3;0.3;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="392" cy="336" r="12"><animate attributeName="fill-opacity" values="0.3;1;0.3;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="336" r="12"><animate attributeName="fill-opacity" values="0.3;0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
  </g>
  <!-- soft cyan gloss (slow, smooth) -->
  <g clip-path="url(#pa-tileclip)"><rect x="-300" y="-40" width="150" height="620" fill="url(#pa-glint)" transform="skewX(-14)">
    <animate attributeName="x" values="-300;640;640" keyTimes="0;0.6;1" dur="5.5s" repeatCount="indefinite"/>
  </rect></g>
</svg>
