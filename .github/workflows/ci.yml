name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── STAGE 1: Quality (parallel with Stage 2) ─────────────────
  quality:
    name: "Stage 1 · Quality"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Full matrix on main push, single node on PRs
        node-version: ${{ github.event_name == 'push' && fromJSON('[20, 22, 24]') || fromJSON('[22]') }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - name: Lint (syntax + framing guard + zero-cloud guard)
        run: npm run lint
      - name: Unit + integration tests (count enforced by readiness gate)
        run: npm test
      - name: Coverage report (src; bin/ excluded — process bootstrap, see gate note)
        if: matrix.node-version == 22
        run: npm run test:coverage 2>&1 | tail -40
      - name: Coverage gate — 100% lines + 100% functions + 100% branches on src
        if: matrix.node-version == 22
        run: npm run coverage

  # ── STAGE 2: Security Gate (parallel with Stage 1) ───────────
  secret-scan:
    name: "Stage 2 · Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-audit:
    name: "Stage 2 · Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: npm audit (high + critical)
        run: npm audit --audit-level=high
        continue-on-error: true # advisory — beta SDK transitive deps
      - name: License compliance (no GPL in the tree)
        run: npx license-checker --production --failOn "GPL-3.0;AGPL-3.0" --summary
        continue-on-error: true

  # ── STAGE 3: Build Verification ──────────────────────────────
  build:
    name: "Stage 3 · Build Verification"
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: Package dry-run (the repo must pack clean)
        run: npm pack --dry-run
      - name: CLI smoke — one full scripted session, unpaced
        run: node bin/punditpay.js agent --brain=rules --wallet=local --pace=0 --no-persist

  # ── STAGE 4: E2E ─────────────────────────────────────────────
  e2e:
    name: "Stage 4 · E2E (real HTTP)"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: Offline-reasoning proof (network tripwire)
        run: npm run verify:offline
      - name: E2E suites over real sockets
        run: node --test test/tipjar.e2e.test.js test/agent.e2e.test.js

  # ── STAGE 5: Performance ─────────────────────────────────────
  performance:
    name: "Stage 5 · Performance"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: Reproducible benchmark (p50/p95)
        run: npm run bench
      - name: Performance budget — x402 p95 must stay under 25ms on CI hardware
        run: |
          node -e "
            const r = require('./bench-results.json');
            const p95 = r.x402TotalMs.p95;
            console.log('x402 total p95:', p95, 'ms');
            if (p95 > 25) { console.error('::error::x402 p95 ' + p95 + 'ms exceeds 25ms budget'); process.exit(1); }
          "
      - uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: bench-results.json
          retention-days: 30

  # ── STAGE 6: Deploy Gate (main only) ─────────────────────────
  deploy-gate:
    name: "Stage 6 · Submission Gate"
    needs: [quality, secret-scan, dependency-audit, build, e2e, performance]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: Submission readiness (placeholders, claims vs reality)
        run: npm run check:readiness
      - name: All gates passed
        run: |
          echo "🚀 All CI/CD gates passed"
          echo "  ✅ Stage 1 — Quality (lint + full test suite, Node 20/22/24)"
          echo "  ✅ Stage 2 — Security (TruffleHog + npm audit + licenses)"
          echo "  ✅ Stage 3 — Build (pack + full-session CLI smoke)"
          echo "  ✅ Stage 4 — E2E (offline proof + real-socket suites)"
          echo "  ✅ Stage 5 — Performance (p95 budget + artifact)"
          echo "  ✅ Stage 6 — Submission readiness"
